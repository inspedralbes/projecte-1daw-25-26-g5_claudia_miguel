<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registre Incidència</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <button type="button" class="btn btn-secondary rounded-0 btn-sm">Tornar enrere</button>

   <div class="container">
    <div class="mx-auto">
  <h1 class="mt-5">Registrar incidència</h1>
  <hr>

  <form action="">
    
    <div class="mt-5">
    <label for="departament" class="form-label">Introdueix departament:</label>
    <input type="text" id="departament" name="departament" class="form-control" required>
     </div>

    <div class="mt-5">
    <label for="data" class="form-label">Data d'incidència:</label><br>
    <input type="date" id="data" name="data" class="form-control">
    </div>

    <div class="mt-5">
    <label for="descripcio" class="form-label">Descripció:</label>
    <textarea id="descripcio" name="descripcio" rows="3" class="form-control" required></textarea>
    </div>

    <div class="mt-5">
    <button type="submit" class="btn btn-primary">Enviar</button>
    </div>
  </form>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </div>
</div>
</body>
</html>
